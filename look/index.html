    <!-- Trackify - Captura de UTMs no funil -->
    <script>
      (function(){
        try {
          var p = new URLSearchParams(window.location.search);
          var keys = ['utm_source','utm_campaign','utm_medium','utm_content','utm_term','utm_id','xcod','sck','fbclid','gclid','ttclid'];
          var data = {};
          keys.forEach(function(k){
            var v = p.get(k);
            if (v) {
              data[k] = v;
              try { localStorage.setItem('lv_'+k, v); } catch(e){}
              document.cookie = 'lv_'+k+'='+encodeURIComponent(v)+'; path=/; max-age='+(60*60*24*90);
            }
          });
          document.addEventListener('click', function(e){
            var a = e.target.closest && e.target.closest('a[href]');
            if(!a) return;
            try {
              var url = new URL(a.href, window.location.origin);
              keys.forEach(function(k){
                var v = data[k] || localStorage.getItem('lv_'+k);
                if (v && !url.searchParams.has(k)) url.searchParams.set(k, v);
              });
              a.href = url.toString();
            } catch(e){}
          }, true);
        } catch(e){}
      })();
    </script>
